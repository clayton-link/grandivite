<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="115" fill="#2C5F5A"/>
  <!-- A Walk Together — grandparent (warm/cream) and grandchild (coral), linked by teal arc -->
  <svg x="106" y="128" width="300" height="256" viewBox="0 0 64 56">
    <!-- grandparent figure (cane detail, warm cream on teal) -->
    <circle cx="20" cy="14" r="4.5" fill="#FDEEE9"/>
    <path d="M14 50 Q14 22 20 22 Q26 22 26 50 Z" fill="#FDEEE9"/>
    <line x1="26" y1="32" x2="30" y2="50" stroke="#FDEEE9" stroke-width="1.8" stroke-linecap="round"/>
    <!-- grandchild figure (coral) -->
    <circle cx="42" cy="22" r="3.6" fill="#E07A5F"/>
    <path d="M37 50 Q37 30 42 30 Q47 30 47 50 Z" fill="#E07A5F"/>
    <!-- teal linking arc (the brand connection) -->
    <path d="M27 36 Q34 32 38 36" stroke="#FDFCFA" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  </svg>
</svg>
